version: '3.8'

services:
  # 1. Nginx Proxy Inverso: Punto único de entrada (Puertos 80 y 443)
  proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    networks:
      - proxy-network

  # 2. ACME Companion: Gestión automática de certificados Let's Encrypt
  ssl-generator:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=luisming96@gmail.com
      - NGINX_PROXY_CONTAINER=nginx-proxy
    depends_on:
      - proxy
    networks:
      - proxy-network

  # 3. Portainer: Gestión de contenedores
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    environment:
      - VIRTUAL_HOST=portainer-luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=portainer-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy-network

  # 4. Prometheus: Monitorización (Scraping de métricas)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    environment:
      - VIRTUAL_HOST=prometheus-luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=prometheus-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=9090
    networks:
      - proxy-network
      - monitor-network

  # 5. Grafana: Visualización de métricas
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    environment:
      - VIRTUAL_HOST=grafana-luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=grafana-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - proxy-network
      - monitor-network

  # APLICACIÓN DEL ALUMNO: Vitaclick
  vitaclick:
    image: nginx:alpine # O la imagen específica de tu app
    container_name: usabilidad-container
    restart: always
    volumes:
      - /home/luismi/app_vitaclick/pages:/usr/share/nginx/html:ro
      - /home/luismi/app_vitaclick/assets:/usr/share/nginx/html/assets:ro
    environment:
      - VIRTUAL_HOST=usabilidad.luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=usabilidad.luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=80
    networks:
      - proxy-network

networks:
  # Red para el tráfico externo a través del proxy
  proxy-network:
    name: proxy-network
  # Red interna para monitorización (Prometheus -> Grafana)
  monitor-network:
    name: monitor-network

volumes:
  certs:
  vhost:
  html:
  acme:
  portainer_data:
  prometheus_data:
  grafana_data:
