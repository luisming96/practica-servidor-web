services:
  # 1. El Proxy (El corazón que reparte el tráfico)
  proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    networks:
      - proxy-network

  # 2. Generador SSL (Lo dejamos pero sin darle órdenes para que no estorbe)
  ssl-generator:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=luisming96@gmail.com
      - NGINX_PROXY_CONTAINER=nginx-proxy
    networks:
      - proxy-network

  # 3. Tu App Vitaclick
  usabilidad:
    image: nginx:alpine
    container_name: usabilidad-container
    volumes:
      - /home/luismi/app_vitaclick/pages:/usr/share/nginx/html:ro
    environment:
      - VIRTUAL_HOST=usabilidad.luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=80
    networks:
      - proxy-network

  # 4. Portainer
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    environment:
      - VIRTUAL_HOST=portainer-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy-network

  # 5. Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    environment:
      - VIRTUAL_HOST=prometheus-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=9090
    networks:
      - proxy-network
      - monitor-network

  # 6. Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - VIRTUAL_HOST=grafana-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - proxy-network
      - monitor-network

networks:
  proxy-network:
    name: proxy-network
  monitor-network:
    name: monitor-network

volumes:
  certs:
  vhost:
  html:
  acme:
  portainer_data:
  prometheus_data:
  grafana_data:
