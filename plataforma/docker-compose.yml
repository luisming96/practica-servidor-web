services:
  proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    labels:
      - com.github.nginx-proxy.nginx=true
    restart: always
    environment:
      - DEFAULT_HOST=usabilidad2.luisming.servidorgp.somosdelprieto.com
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    networks:
      - proxy-network

  ssl-generator:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: always
    depends_on:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=luisming96@gmail.com
      - NGINX_PROXY_CONTAINER=nginx-proxy
    networks:
      - proxy-network

  usabilidad:
    image: nginx:alpine
    container_name: usabilidad-container
    volumes:
      - /home/luismi/app_vitaclick/Estudio_de_usabilidad/pages:/usr/share/nginx/html:ro
      - /home/luismi/app_vitaclick/Estudio_de_usabilidad/assets:/usr/share/nginx/html/assets:ro
    environment:
      - VIRTUAL_HOST=usabilidad2.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=usabilidad2.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_EMAIL=luisming96@gmail.com
    networks:
      - proxy-network

  landing:
    image: luisming96/landing-page:latest
    container_name: landing-container
    environment:
      - VIRTUAL_HOST=luisming.servidorgp.somosdelprieto.com
    networks:
      - proxy-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    environment:
      - VIRTUAL_HOST=portainer.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=portainer.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_EMAIL=luisming96@gmail.com
      - VIRTUAL_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    environment:
      - VIRTUAL_HOST=prometheus.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=prometheus.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_EMAIL=luisming96@gmail.com
      - VIRTUAL_PORT=9090
    networks:
      - proxy-network
      - monitoring-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - VIRTUAL_HOST=grafana.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=grafana.luisming.servidorgp.somosdelprieto.com
      - LETSENCRYPT_EMAIL=luisming96@gmail.com
      - VIRTUAL_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - proxy-network
      - monitoring-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
    volumes:
      - /:/host:ro,rslave
    restart: always
    networks:
      - monitoring-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring-network

networks:
  proxy-network:
    external: true
  monitoring-network:
    driver: bridge
    internal: true

volumes:
  certs:
  vhost:
  html:
  acme:
  portainer_data:
  prometheus_data:
  grafana_data:
