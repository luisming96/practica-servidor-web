version: '3'

services:
  proxy:
    image: jwilder/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    networks:
      - proxy-network

  ssl-generator:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: always
    volumes_from:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=luisming96@gmail.com
    networks:
      - proxy-network

  landing:
    image: luisming96/landing-page:latest
    container_name: landing-container
    environment:
      - VIRTUAL_HOST=luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=80
    networks:
      - proxy-network

  usabilidad:
    image: nginx:alpine
    container_name: usabilidad-container
    environment:
      - VIRTUAL_HOST=usabilidad.luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=usabilidad.luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=80
    networks:
      - proxy-network

  portainer:
    image: 'portainer/portainer-ce:2.21.5-alpine'
    container_name: portainer
    environment:
      - VIRTUAL_HOST=portainer-luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=portainer-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy-network

  prometheus:
    image: 'prom/prometheus:v3.1.0'
    container_name: prometheus
    environment:
      - VIRTUAL_HOST=prometheus-luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=prometheus-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - proxy-network

  grafana:
    image: 'grafana/grafana:latest'
    container_name: grafana
    environment:
      - VIRTUAL_HOST=grafana-luismi.servidorgp.somosdelprieto.com
      - LETSENCRYPT_HOST=grafana-luismi.servidorgp.somosdelprieto.com
      - VIRTUAL_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - proxy-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true

volumes:
  certs:
  vhost:
  html:
  acme:
  portainer_data:
  prometheus_data:
  grafana_data:
